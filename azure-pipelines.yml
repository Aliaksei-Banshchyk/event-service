# ──────────────────────────────────────────────────────────────────────────────
# Azure Pipelines – event_service
#
# Stage 1 – Static Analysis  : flake8 syntax / style check
# Stage 2 – Tests            : pytest, results published as JUnit + artifacts
# ──────────────────────────────────────────────────────────────────────────────
trigger:
  branches:
    include:
      - main
      - develop
pr:
  branches:
    include:
      - main
      - develop

pool:
  vmImage: ubuntu-latest

variables:
  PYTHON_VERSION: "3.12"
  PIP_CACHE_DIR: $(Pipeline.Workspace)/.pip
  ARTIFACTS_FEED: "volunteer-feed"

stages:
# ╔══════════════════════════════════════════════════════════════════════════╗
# ║  STAGE 1 – Static Analysis (flake8)                                     ║
# ╚══════════════════════════════════════════════════════════════════════════╝
  - stage: StaticAnalysis
    displayName: "Stage 1 – Static Analysis (flake8)"
    jobs:
      - job: Flake8
        displayName: "flake8 – syntax & style check"
        steps:
          - task: UsePythonVersion@0
            displayName: "Use Python $(PYTHON_VERSION)"
            inputs:
              versionSpec: "$(PYTHON_VERSION)"
              addToPath: true

          - task: Cache@2
            displayName: "Cache pip packages"
            inputs:
              key: 'pip | "$(Agent.OS)" | requirements.txt'
              restoreKeys: |
                pip | "$(Agent.OS)"
              path: $(PIP_CACHE_DIR)

          - script: |
              python -m pip install --upgrade pip
              pip install flake8
            displayName: "Install flake8"

          - script: |
              flake8 . \
                --exclude=.venv,__pycache__,.git \
                --max-line-length=120 \
                --statistics \
                --count \
                --format="%(path)s:%(row)d:%(col)d: %(code)s %(text)s" \
                | tee flake8-report.txt
            displayName: "Run flake8"

          - task: PublishPipelineArtifact@1
            displayName: "Publish flake8 report"
            condition: always()
            inputs:
              targetPath: "flake8-report.txt"
              artifact: "flake8-report"
              publishLocation: "pipeline"

# ╔══════════════════════════════════════════════════════════════════════════╗
# ║  STAGE 2 – Tests (pytest)                                               ║
# ╚══════════════════════════════════════════════════════════════════════════╝
  - stage: Tests
    displayName: "Stage 2 – Tests (pytest)"
    dependsOn: StaticAnalysis
    condition: succeeded()
    jobs:
      - job: Pytest
        displayName: "pytest – unit tests"
        steps:
          - task: UsePythonVersion@0
            displayName: "Use Python $(PYTHON_VERSION)"
            inputs:
              versionSpec: "$(PYTHON_VERSION)"
              addToPath: true

          - task: Cache@2
            displayName: "Cache pip packages"
            inputs:
              key: 'pip | "$(Agent.OS)" | requirements.txt'
              restoreKeys: |
                pip | "$(Agent.OS)"
              path: $(PIP_CACHE_DIR)

          - task: PipAuthenticate@1
            displayName: "Authenticate with Azure Artifacts"
            inputs:
              artifactFeeds: $(ARTIFACTS_FEED)
              onlyAddExtraIndex: true

          - script: |
              python -m pip install --upgrade pip
              pip install -r requirements.txt
              pip install pytest pytest-cov sqlalchemy \
                          python-jose[cryptography] passlib \
                          httpx pyodbc volunteer-shared
            displayName: "Install dependencies"

          - script: |
              mkdir -p test-results
              pytest tests/ \
                -v \
                --asyncio-mode=auto \
                --junitxml=test-results/results.xml \
                --cov=. \
                --cov-report=xml:test-results/coverage.xml \
                --cov-report=term-missing
            displayName: "Run pytest"
            env:
              AZURE_PG_URL: "sqlite+aiosqlite:///:memory:"
              AZURE_SB_CONNECTION_STRING: ""

          - task: PublishTestResults@2
            displayName: "Publish test results"
            condition: always()
            inputs:
              testResultsFormat: "JUnit"
              testResultsFiles: "test-results/results.xml"
              failTaskOnFailedTests: true
              testRunTitle: "pytest – event_service"

          - task: PublishCodeCoverageResults@2
            displayName: "Publish code coverage"
            condition: always()
            inputs:
              summaryFileLocation: "test-results/coverage.xml"

          - task: PublishPipelineArtifact@1
            displayName: "Publish test artifacts"
            condition: always()
            inputs:
              targetPath: "test-results"
              artifact: "pytest-results"
              publishLocation: "pipeline"